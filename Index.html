<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alejandro | Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="lang-switch">
    <img src="assets/lang/EnButtons3.png" onclick="setLang('en')" id="btn-en">
    <img src="assets/lang/EsButtons3.png" onclick="setLang('es')" id="btn-es">
</div>

<header>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
</header>

<section>
    <h2 id="projectsTitle"></h2>

    
    <div class="card project">
        <div class="project-text">
            <h3 id="proj1Title"></h3>
            <p id="proj1Desc"></p>
        </div>

        <img src="assets/gifs/project1.gif" class="project-gif">
    </div>

    
    <div class="card project">
        <div class="project-text">
            <h3 id="proj2Title"></h3>
            <p id="proj2Desc"></p>
        </div>

        <img src="assets/gifs/project2.gif" class="project-gif">
    </div>

</section>

<section>
    <h2 id="aboutTitles"></h2>
    <p id="aboutText"></p>
</section>

<section>
    <h2 id="contactTitle"></h2>
    <p>
        <a href="https://github.com/yourusername">GitHub</a> |
        <a href="https://www.artstation.com/alahros">ArtStation</a> |
        <a href="https://alahros.itch.io/">Itch.io</a>
    </p>
</section>

<script>
const content = {
    en: {
        title: "Alejandro Ahumada",
        subtitle: "2D Artist | Pixel Art | Unity Game Developer",
        projectsTitle: "Projects",
        proj1Title: "Mi Esmeralda",
        proj1Desc: "2.5D videogame developed for LAGS Game Jam, where I worked as the main 2D artist, creating characters and props and animating them, with a strong focus on visual aesthetics.",
        proj2Title: "Asteroid Energy",
        proj2Desc: "Videogame developed for Limited Capacity Game Jam, where I worked as the main 2D artist, creating characters and props, animating them, and also handling character movement programming and Animator setup.",
        aboutTitle: "About Me",
        aboutText: "I'm a 2D artist and game developer focused on pixel art and animation.",
        contactTitle: "Contact"
    },

    es: {
        title: "Alejandro Ahumada",
        subtitle: "Artista 2D | Pixel Art | Desarrollador en Unity",
        projectsTitle: "Proyectos",
        proj1Title: "Mi Esmeralda",
        proj1Desc: "Juego desarrollado para la LAGS Game Jam, donde fui artista principal de personajes 2D y props, enfocado en la estética y animación.",
        proj2Title: "Asteroid Energy",
        proj2Desc: "Videojuego desarrollado para la Limited Capacity Game Jam, donde fui artista 2D principal, creando personajes, props, animaciones y trabajando también en programación del personaje y Animator.",
        aboutTitle: "Sobre mí",
        aboutText: "Soy un artista 2D y desarrollador enfocado en pixel art y animación.",
        contactTitle: "Contacto"
    }
};

function setLang(lang) {
    document.getElementById("title").innerText = content[lang].title;
    document.getElementById("subtitle").innerText = content[lang].subtitle;
    document.getElementById("projectsTitle").innerText = content[lang].projectsTitle;
    document.getElementById("proj1Title").innerText = content[lang].proj1Title;
    document.getElementById("proj1Desc").innerText = content[lang].proj1Desc;
    document.getElementById("proj2Title").innerText = content[lang].proj2Title;
    document.getElementById("proj2Desc").innerText = content[lang].proj2Desc;
    document.getElementById("aboutTitle").innerText = content[lang].aboutTitle;
    document.getElementById("aboutText").innerText = content[lang].aboutText;
    document.getElementById("contactTitle").innerText = content[lang].contactTitle;
}

setLang('en');
</script>

</body>
</html>
